version: 1
workspace_name: demo
gateway:
  port: 8080
repos:
- name: agent-py
  path: agent-py
  runtime: python
  framework: plain
  package_manager: pip
  status: unresolved
  detection_confidence: low
  command_candidates: []
  services_namespace: agent-py
  enabled: true
  services:
  - id: app
    kind: agent
    port: 0
    cwd: .
    run:
    - python3
    - server.py
    connections:
      mcp_servers:
      - service_ref: mcp-node/calc
      - service_ref: mcp-web/scraper
    ui:
      primary_mode: chat
      chat:
        method: POST
        path: /
        streaming: false
        request_content_type: application/json
        request_message_json_path: message
        response_message_json_path: body
    mount_path: /agents/py
    watch_mode: internal
    watch_paths:
    - server.py
    - pyproject.toml
- name: agent-swift
  path: agent-swift
  runtime: swift
  framework: hummingbird
  package_manager: swiftpm
  status: discoverable
  detection_confidence: medium
  command_candidates:
  - argv:
    - swift
    - run
    reason: SwiftPM repository
  selected_command:
  - swift
  - run
  services_namespace: agent-swift
  enabled: true
  services:
  - id: app
    kind: agent
    port: 0
    cwd: .
    run:
    - .build/debug/AgentSwift
    build:
    - swift
    - build
    health:
      startup_ready_timeout: 120s
    connections:
      mcp_servers:
      - service_ref: mcp-node/calc
      - service_ref: mcp-web/scraper
    ui:
      primary_mode: chat
      chat:
        method: POST
        path: /
        streaming: false
        request_content_type: application/json
        request_message_json_path: message
        response_message_json_path: body
    mount_path: /agents/swift
    watch_mode: external
    watch_paths:
    - Sources/Server.swift
    - Package.swift
- name: mcp-node
  path: mcp-node
  runtime: node
  framework: plain
  package_manager: npm
  status: discoverable
  detection_confidence: medium
  command_candidates:
  - argv:
    - npm
    - run
    - dev
    reason: package.json scripts.dev
  selected_command:
  - npm
  - run
  - dev
  services_namespace: mcp-node
  enabled: true
  services:
  - id: calc
    kind: mcp
    port: 0
    cwd: .
    run:
    - node
    - server.js
    mcp:
      transport: streamable_http
      path: /mcp
    mount_path: /mcp/node
    watch_mode: internal
    watch_paths:
    - server.js
    - package.json
- name: mcp-web
  path: mcp-web
  runtime: python
  framework: plain
  package_manager: pip
  status: unresolved
  detection_confidence: low
  command_candidates: []
  services_namespace: mcp-web
  enabled: true
  services:
  - id: scraper
    kind: mcp
    port: 0
    cwd: .
    run:
    - python3
    - server.py
    mcp:
      transport: streamable_http
      path: /mcp
    mount_path: /mcp/web
    watch_mode: internal
    watch_paths:
    - server.py
    - pyproject.toml
