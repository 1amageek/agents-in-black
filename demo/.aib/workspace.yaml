gateway:
  port: 8080
repos:
  - command_candidates: []
    detection_confidence: low
    enabled: true
    framework: plain
    name: agent-py
    package_manager: pip
    path: agent-py
    runtime: python
    services:
      - connections:
          mcp_servers:
            - service_ref: mcp-node/calc
            - service_ref: mcp-web/scraper
        cwd: .
        id: app
        kind: agent
        mount_path: /agents/py
        port: 0
        run:
          - python3
          - server.py
        ui:
          chat:
            method: POST
            path: /
            request_content_type: application/json
            request_message_json_path: message
            response_message_json_path: body
            streaming: false
          primary_mode: chat
        watch_mode: internal
        watch_paths:
          - server.py
          - pyproject.toml
    services_namespace: agent-py
    status: unresolved
  - command_candidates:
      - argv:
          - swift
          - run
        reason: SwiftPM repository
    detection_confidence: medium
    enabled: true
    framework: hummingbird
    name: agent-swift
    package_manager: swiftpm
    path: agent-swift
    runtime: swift
    selected_command:
      - swift
      - run
    services:
      - build:
          - swift
          - build
        connections:
          mcp_servers:
            - service_ref: mcp-node/calc
            - service_ref: mcp-web/scraper
        cwd: .
        health:
          startup_ready_timeout: 120s
        id: app
        kind: agent
        mount_path: /agents/swift
        port: 0
        run:
          - .build/debug/AgentSwift
        ui:
          chat:
            method: POST
            path: /
            request_content_type: application/json
            request_message_json_path: message
            response_message_json_path: body
            streaming: false
          primary_mode: chat
        watch_mode: external
        watch_paths:
          - Sources/Server.swift
          - Package.swift
    services_namespace: agent-swift
    status: discoverable
  - command_candidates:
      - argv:
          - npm
          - run
          - dev
        reason: package.json scripts.dev
    detection_confidence: medium
    enabled: true
    framework: plain
    name: mcp-node
    package_manager: npm
    path: mcp-node
    runtime: node
    selected_command:
      - npm
      - run
      - dev
    services:
      - cwd: .
        id: calc
        kind: mcp
        mcp:
          path: /mcp
          transport: streamable_http
        mount_path: /mcp/node
        port: 0
        run:
          - node
          - server.js
        watch_mode: internal
        watch_paths:
          - server.js
          - package.json
    services_namespace: mcp-node
    status: discoverable
  - command_candidates: []
    detection_confidence: low
    enabled: true
    framework: plain
    name: mcp-web
    package_manager: pip
    path: mcp-web
    runtime: python
    services:
      - cwd: .
        id: scraper
        kind: mcp
        mcp:
          path: /mcp
          transport: streamable_http
        mount_path: /mcp/web
        port: 0
        run:
          - python3
          - server.py
        watch_mode: internal
        watch_paths:
          - server.py
          - pyproject.toml
    services_namespace: mcp-web
    status: unresolved
version: 1
workspace_name: demo
