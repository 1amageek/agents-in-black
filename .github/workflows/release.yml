name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  XCPROJECT: AgentsInBlack/AgentsInBlack.xcodeproj
  SCHEME: AgentsInBlack

jobs:
  # ── Build & sign macOS App, create DMG ─────────────────────────
  build-app:
    name: Build macOS App
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          BUILD_NUMBER="$(echo "$VERSION" | tr -d '.')"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Store notarization key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_AUTH_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/notarize"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notarize/AuthKey.p8"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH/AgentsInBlack.provisionprofile"

      - name: Archive app
        run: |
          xcodebuild archive \
            -project "$XCPROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/AgentsInBlack.xcarchive" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            ONLY_ACTIVE_ARCH=NO

      - name: Export archive
        env:
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          cat > "$RUNNER_TEMP/export-options.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Developer ID Application</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>team.stamp.AgentsInBlack</key>
                  <string>${PROVISIONING_PROFILE_SPECIFIER}</string>
              </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AgentsInBlack.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/export-options.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Notarize app
        run: |
          APP_PATH="$RUNNER_TEMP/export/AgentsInBlack.app"

          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/app-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/app-notarize.zip" \
            --key "$RUNNER_TEMP/notarize/AuthKey.p8" \
            --key-id "${{ secrets.ASC_KEY_ID }}" \
            --issuer "${{ secrets.ASC_ISSUER_ID }}" \
            --wait --timeout 15m

          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="$RUNNER_TEMP/export/AgentsInBlack.app"
          DMG_PATH="$RUNNER_TEMP/AgentsInBlack.dmg"

          STAGING="$(mktemp -d)"
          cp -a "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "AgentsInBlack" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"
          rm -rf "$STAGING"

      - name: Sign and notarize DMG
        run: |
          DMG_PATH="$RUNNER_TEMP/AgentsInBlack.dmg"

          codesign --force --timestamp \
            --sign "Developer ID Application" \
            "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$RUNNER_TEMP/notarize/AuthKey.p8" \
            --key-id "${{ secrets.ASC_KEY_ID }}" \
            --issuer "${{ secrets.ASC_ISSUER_ID }}" \
            --wait --timeout 15m

          xcrun stapler staple "$DMG_PATH"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: ${{ runner.temp }}/AgentsInBlack.dmg

      - name: Cleanup keychain and profiles
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -rf "$RUNNER_TEMP/notarize" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/AgentsInBlack.provisionprofile" || true

  # ── Build & sign CLI binary ────────────────────────────────────
  build-cli:
    name: Build CLI (arm64)
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CLI
        run: |
          swift build -c release --arch arm64

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Store notarization key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_AUTH_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/notarize"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notarize/AuthKey.p8"

      - name: Sign CLI binaries
        run: |
          BIN_PATH="$(swift build -c release --arch arm64 --show-bin-path)"
          for bin in aib aib-dev; do
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application" \
              "$BIN_PATH/$bin"
          done
          echo "BIN_PATH=$BIN_PATH" >> "$GITHUB_ENV"

      - name: Notarize CLI
        run: |
          zip -j "$RUNNER_TEMP/cli-notarize.zip" \
            "$BIN_PATH/aib" "$BIN_PATH/aib-dev"

          xcrun notarytool submit "$RUNNER_TEMP/cli-notarize.zip" \
            --key "$RUNNER_TEMP/notarize/AuthKey.p8" \
            --key-id "${{ secrets.ASC_KEY_ID }}" \
            --issuer "${{ secrets.ASC_ISSUER_ID }}" \
            --wait --timeout 10m

      - name: Package CLI archive
        run: |
          tar -czf "$RUNNER_TEMP/aib-macos-arm64.tar.gz" \
            -C "$BIN_PATH" aib aib-dev

      - name: Upload CLI archive
        uses: actions/upload-artifact@v4
        with:
          name: cli-arm64
          path: ${{ runner.temp }}/aib-macos-arm64.tar.gz

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -rf "$RUNNER_TEMP/notarize" || true

  # ── Create GitHub Release ──────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-app, build-cli]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS App
            Download `AgentsInBlack.dmg`, open it, and drag AgentsInBlack to Applications.

            ### CLI (Apple Silicon)
            ```bash
            curl -L https://github.com/1amageek/agents-in-black/releases/download/${{ github.ref_name }}/aib-macos-arm64.tar.gz | tar xz -C /usr/local/bin
            ```
          files: |
            artifacts/dmg/AgentsInBlack.dmg
            artifacts/cli-arm64/aib-macos-arm64.tar.gz
